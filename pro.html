<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Checker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 col-md-6 mx-auto">
        <h2 class="text-center text-primary mb-4">
            Student Grade Checker
        </h2>

        <div class="mb-3">
            <label class="form-label">Student Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter Name">
        </div>

        <div class="mb-3">
            <label class="form-label">Marks</label>
            <input type="number" id="marks" class="form-control" placeholder="Enter Marks">
        </div>

        <button class="btn btn-success w-100" onclick="checkGrade()">
            Check Grade
        </button>

        <div id="result" class="alert alert-info mt-4 text-center">
            Result will appear here.
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
